<!DOCTYPE html>
<html>
<head>
  <title>Uber Clone Stable</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body { margin: 0; font-family: Arial; }
    .container { display: flex; height: 100vh; }

    .panel {
      width: 50%;
      padding: 15px;
      overflow-y: auto;
      box-sizing: border-box;
    }

    .rider { background: #f4f8ff; border-right: 1px solid #ccc; }
    .driver { background: #fff4f4; }

    input {
      width: 95%;
      padding: 8px;
      margin-bottom: 6px;
    }

    button {
      padding: 8px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .ride {
      background: white;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ddd;
    }

    #map {
      height: 300px;
      margin-top: 10px;
    }

    .suggestions {
      position: absolute;
      background: white;
      border: 1px solid #ddd;
      width: 95%;
      z-index: 9999;
    }

    .suggestions div {
      padding: 6px;
      cursor: pointer;
    }

    .suggestions div:hover {
      background: #eee;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="panel rider">
    <h2>Rider</h2>

    <input id="pickup" placeholder="Pickup"/>
    <div id="pickupList" class="suggestions"></div>

    <input id="destination" placeholder="Destination"/>
    <div id="dropList" class="suggestions"></div>

    <button onclick="createRide()">Create Ride</button>

    <div id="riderRides"></div>

    <div id="map"></div>
  </div>

  <div class="panel driver">
    <h2>Driver</h2>
    <div id="driverRides"></div>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="app.js"></script>

</body>
</html>
