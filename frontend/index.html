<!DOCTYPE html>
<html>
<head>
  <title>Uber Clone Debug</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body { font-family: Arial; padding: 20px; }

    .status { font-size: 18px; margin-bottom: 10px; }

    button { padding: 8px 12px; margin: 3px; cursor: pointer; }

    input { padding: 8px; width: 250px; margin: 4px 0; }

    pre { background: #111; color: #0f0; padding: 10px; height: 150px; overflow: auto; }

    #map { height: 350px; margin-top: 10px; border: 1px solid #ccc; }

    .ride { border: 1px solid #ccc; padding: 10px; margin-bottom: 8px; }
  </style>
</head>

<body>

<h1>🚗 Uber Clone Debug</h1>

<div id="status">Starting...</div>

<button onclick="checkBackend()">Check Backend</button>
<button onclick="loadRides()">Refresh</button>

<br><br>

<button onclick="setMode('rider')">Rider</button>
<button onclick="setMode('driver')">Driver</button>

<span id="modeLabel">Current: RIDER</span>

<br><br>

<button id="driverToggle" onclick="toggleDriver()">Go ONLINE</button>

<hr>

<h3>Pickup</h3>
<input id="pickup" placeholder="Search pickup"/>
<button onclick="handlePickupSearch()">Search</button>

<h3>Drop</h3>
<input id="destination" placeholder="Search drop"/>
<button onclick="handleDropSearch()">Search</button>

<br><br>

<button onclick="createRide()">Create Ride</button>

<h3>Rides</h3>
<div id="rides"></div>

<h3>Map</h3>
<div id="map"></div>

<h3>Debug</h3>
<pre id="log"></pre>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
