<!DOCTYPE html>
<html>
<head>
  <title>Uber Clone Debug</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .status {
      font-size: 18px;
      margin-bottom: 10px;
    }

    button {
      padding: 8px 12px;
      margin: 3px;
      cursor: pointer;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 10px;
      height: 200px;
      overflow: auto;
    }

    .box {
      margin-bottom: 20px;
    }

    .ride {
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <h1>🚗 Uber Clone Debug Dashboard</h1>

  <div class="box">
    <div id="status" class="status">⏳ Starting...</div>

    <button onclick="checkBackend()">Check Backend</button>
    <button onclick="createRide()">Create Ride</button>
    <button onclick="loadRides()">Refresh Rides</button>

    <div style="margin-top:10px;">
  <b>Mode:</b>
  <button onclick="setMode('rider')">👤 Rider</button>
  <button onclick="setMode('driver')">🚗 Driver</button>

  <span id="modeLabel">Current: Rider</span>
</div>

    
  </div>

  <h3>🚗 Rides</h3>
  <div id="rides"></div>

  <h3>🧠 Debug Console</h3>
  <pre id="log"></pre>

  <script src="app.js"></script>

</body>
</html>
