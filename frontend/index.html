<!DOCTYPE html>
<html>
<head>
  <title>Stealth Dispatch</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body { margin:0; font-family:Arial; display:flex; height:100vh; }

    /* LEFT PANEL */
    .left {
      width:420px;
      background:#111;
      color:white;
      padding:15px;
      overflow:auto;
    }

    .tabbar button {
      width:100%;
      margin:5px 0;
      padding:10px;
      background:#222;
      color:white;
      border:none;
      cursor:pointer;
    }

    .tabbar button:hover { background:#333; }

    input {
      width:100%;
      padding:10px;
      margin:5px 0;
      border:none;
    }

    .card {
      background:#1c1c1c;
      padding:10px;
      margin:10px 0;
      border-left:3px solid orange;
    }

    button.action {
      width:100%;
      padding:8px;
      margin-top:5px;
      background:orange;
      border:none;
    }

    /* MAP */
    #map {
      flex:1;
    }

    .suggestions {
      background:white;
      color:black;
      position:absolute;
      width:380px;
      z-index:999;
    }

    .suggestions div {
      padding:5px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="left">

  <h2>STEALTH</h2>

  <div class="tabbar">
    <button onclick="setTab('passenger')">🚕 Passenger</button>
    <button onclick="setTab('parcel')">📦 Parcel</button>
    <button onclick="setTab('freight')">🚚 Freight</button>
  </div>

  <div id="inputs">

    <input id="origin" placeholder="Origin"/>
    <input id="destination" placeholder="Destination"/>

    <div id="originList"></div>
    <div id="destinationList"></div>

    <button onclick="submit()">Submit</button>

  </div>

  <div id="list"></div>

</div>

<div id="map"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="app.js"></script>

</body>
</html>
