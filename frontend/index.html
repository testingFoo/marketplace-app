<!DOCTYPE html>
<html>
<head>
  <title>Uber Clone Step H</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body { font-family: Arial; padding: 20px; }
    #map { height: 300px; margin-top: 10px; }
    .ride { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
  </style>
</head>

<body>

<h1>🚗 Uber Clone Step H</h1>

<div id="modeLabel">Current: RIDER</div>

<button onclick="setMode('rider')">Rider</button>
<button onclick="setMode('driver')">Driver</button>
<button onclick="toggleDriver()">Toggle Driver</button>

<br><br>

<input id="pickup" placeholder="Pickup">
<input id="destination" placeholder="Destination">
<button onclick="createRide()">Create Ride</button>

<div id="rides"></div>

<h3>Map</h3>
<div id="map"></div>

<h3>Debug</h3>
<pre id="log"></pre>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
