<!DOCTYPE html>
<html>
<head>
  <title>Uber Clone Step Q</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .panel {
      width: 50%;
      padding: 15px;
      overflow-y: auto;
    }

    .rider { background: #f4f8ff; }
    .driver { background: #fff4f4; }

    #map {
      height: 300px;
      margin-top: 10px;
      border: 1px solid #ccc;
    }

    .ride {
      border: 1px solid #ccc;
      padding: 10px;
      margin: 10px 0;
      background: white;
    }

    input {
      width: 90%;
      padding: 6px;
      margin: 4px 0;
    }

    button {
      padding: 6px 10px;
      margin: 4px;
      cursor: pointer;
    }

    .suggestions {
      border: 1px solid #ccc;
      background: white;
      max-width: 300px;
      position: relative;
      z-index: 1000;
    }

    .suggestion {
      padding: 6px;
      cursor: pointer;
    }

    .suggestion:hover {
      background: #eee;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- RIDER -->
  <div class="panel rider">
    <h2>🚗 Rider</h2>

    <input id="pickup" placeholder="Pickup address"/>
    <div id="pickupSuggestions" class="suggestions"></div>

    <input id="destination" placeholder="Destination address"/>
    <div id="dropSuggestions" class="suggestions"></div>

    <button onclick="createRide()">Create Ride</button>

    <div id="riderRides"></div>

    <div id="map"></div>
  </div>

  <!-- DRIVER -->
  <div class="panel driver">
    <h2>🚕 Driver</h2>

    <div id="driverRides"></div>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
