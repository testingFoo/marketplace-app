<!DOCTYPE html>
<html>
<head>
  <title>Uber Clone Split UI</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial;
    }

    .container {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    .panel {
      width: 50%;
      padding: 15px;
      overflow-y: auto;
    }

    .rider {
      background: #f4f8ff;
      border-right: 2px solid #ccc;
    }

    .driver {
      background: #fff4f4;
    }

    #map {
      height: 250px;
      margin-top: 10px;
      border: 1px solid #ccc;
    }

    .ride {
      border: 1px solid #ccc;
      padding: 10px;
      margin: 10px 0;
      background: white;
    }

    button {
      padding: 6px 10px;
      margin: 4px;
      cursor: pointer;
    }

    input {
      padding: 6px;
      margin: 4px 0;
      width: 90%;
    }

    h2 {
      margin-top: 0;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LEFT: RIDER -->
  <div class="panel rider">
    <h2>🚗 Rider</h2>

    <input id="pickup" placeholder="Pickup"/>
    <input id="destination" placeholder="Destination"/>

    <button onclick="createRide()">Create Ride</button>

    <div id="riderRides"></div>

    <div id="map"></div>
  </div>

  <!-- RIGHT: DRIVER -->
  <div class="panel driver">
    <h2>🚕 Driver</h2>

    <button onclick="toggleDriver()">Toggle Online</button>
    <div id="driverStatus">Offline</div>

    <div id="driverRides"></div>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
