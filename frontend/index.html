<!DOCTYPE html>
<html>
<head>
  <title>Uber Clone Debug</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .status {
      font-size: 18px;
      margin-bottom: 10px;
    }

    button {
      padding: 8px 12px;
      margin: 3px;
      cursor: pointer;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 10px;
      height: 200px;
      overflow: auto;
    }

    .box {
      margin-bottom: 20px;
    }

    .ride {
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
    }

    .modeBox {
      margin-top: 10px;
      padding: 10px;
      border: 1px dashed #999;
    }
  </style>
</head>

<body>

  <h1>🚗 Uber Clone Debug Dashboard</h1>

  <!-- STATUS -->
  <div class="box">
    <div id="status" class="status">⏳ Starting...</div>

    <button onclick="checkBackend()">Check Backend</button>
    <button onclick="createRide()">Create Ride</button>
    <button onclick="loadRides()">Refresh Rides</button>
  </div>

  <!-- MODE SWITCH -->
  <div class="modeBox">
    <b>Mode:</b>

    <button onclick="setMode('rider')">👤 Rider</button>
    <button onclick="setMode('driver')">🚗 Driver</button>

    <br><br>
    <span id="modeLabel">Current: RIDER</span>
  </div>

  <h3>🚗 Create Ride</h3>

<input id="pickup" placeholder="Pickup location" />
<br/><br/>
<input id="destination" placeholder="Destination" />
<br/><br/>

<button onclick="createRide()">Create Ride</button>

  <!-- RIDES -->
  <h3>🚗 Rides</h3>
  <div id="rides"></div>

  <!-- DEBUG CONSOLE -->
  <h3>🧠 Debug Console</h3>
  <pre id="log"></pre>

  <script src="app.js"></script>

</body>
</html>
