<!DOCTYPE html>
<html>
<head>
  <title>Uber Clone Step I (Final UI)</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .panel {
      width: 50%;
      padding: 10px;
      overflow-y: auto;
    }

    .rider {
      background: #f7f7ff;
      border-right: 2px solid #ddd;
    }

    .driver {
      background: #fff7f7;
    }

    #map {
      height: 250px;
      margin-top: 10px;
      border: 1px solid #ccc;
    }

    .ride {
      border: 1px solid #ccc;
      padding: 10px;
      margin: 10px 0;
      background: white;
    }

    button {
      padding: 6px 10px;
      margin: 3px;
      cursor: pointer;
    }

    input {
      padding: 6px;
      margin: 3px;
      width: 80%;
    }

    .title {
      font-weight: bold;
      font-size: 18px;
    }

    .small {
      font-size: 12px;
      color: #666;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- ================= RIDER ================= -->
  <div class="panel rider">
    <div class="title">🚗 Rider App</div>

    <input id="pickup" placeholder="Pickup address"/>
    <input id="destination" placeholder="Destination"/>

    <button onclick="createRide()">Create Ride</button>

    <div id="riderRides"></div>

    <div id="map"></div>
  </div>

  <!-- ================= DRIVER ================= -->
  <div class="panel driver">
    <div class="title">🚕 Driver App</div>

    <button onclick="toggleDriver()">Toggle Online</button>

    <div id="driverRides"></div>

    <div class="small" id="driverStatus">Offline</div>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
