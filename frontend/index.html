<!DOCTYPE html>
<html>
<head>
  <link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
  <title>Uber Clone Debug</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .status {
      font-size: 18px;
      margin-bottom: 10px;
    }

    button {
      padding: 8px 12px;
      margin: 3px;
      cursor: pointer;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 10px;
      height: 200px;
      overflow: auto;
    }

    .box {
      margin-bottom: 20px;
    }

    .ride {
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
    }

    .modeBox {
      margin-top: 10px;
      padding: 10px;
      border: 1px dashed #999;
    }
  </style>
</head>

<body>

  <h1>🚗 Uber Clone Debug Dashboard</h1>

  <!-- STATUS -->
  <div class="box">
    <div id="status" class="status">⏳ Starting...</div>

    <button onclick="checkBackend()">Check Backend</button>
    <button onclick="createRide()">Create Ride</button>
    <button onclick="loadRides()">Refresh Rides</button>
  </div>

  <!-- MODE SWITCH -->
  <div class="modeBox">
    <b>Mode:</b>

    <button onclick="setMode('rider')">👤 Rider</button>
    <button onclick="setMode('driver')">🚗 Driver</button>

    <br><br>

    <!-- 🔥 FIXED DYNAMIC LABEL -->
    <span id="modeLabel">Current: RIDER</span>

    <br><br>

    <button id="driverToggle" onclick="toggleDriver()">Go ONLINE</button>
  </div>

  <h3>🚗 Create Ride</h3>

  <input id="pickup" placeholder="Pickup location" />
  <br/><br/>
  <input id="destination" placeholder="Destination" />
  <br/><br/>

  <button onclick="createRide()">Create Ride</button>

  <!-- RIDES -->
  <h3>🚗 Rides</h3>
  <div id="rides"></div>

  <h3>🗺️ Live Map</h3>
<div id="map" style="height: 300px; width: 100%;"></div>

  
  <!-- DEBUG -->
  <h3>🧠 Debug Console</h3>
  <pre id="log"></pre>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>

</body>
</html>
