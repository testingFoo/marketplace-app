<!DOCTYPE html>
<html>
<head>
  <title>Stealth Transport</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body { margin:0; font-family:Arial; display:flex; height:100vh; }

    /* LEFT PANEL */
    .left {
      width:420px;
      background:#0f0f0f;
      color:white;
      padding:15px;
      overflow:auto;
    }

    .tabs button {
      width:100%;
      padding:10px;
      margin:5px 0;
      background:#1c1c1c;
      color:white;
      border:none;
      cursor:pointer;
    }

    .tabs button:hover { background:#2a2a2a; }

    input {
      width:100%;
      padding:10px;
      margin:5px 0;
      border:none;
      background:#222;
      color:white;
    }

    .card {
      background:#1b1b1b;
      padding:10px;
      margin:10px 0;
      border-left:3px solid orange;
    }

    .section { display:none; }
    .active { display:block; }

    #map { flex:1; }

    .suggestions {
      background:white;
      color:black;
      position:absolute;
      width:380px;
      z-index:999;
    }

    .suggestions div {
      padding:6px;
      cursor:pointer;
    }

    .suggestions div:hover {
      background:#eee;
    }
  </style>
</head>

<body>

<div class="left">

  <h2>STEALTH MARKET</h2>

  <div class="tabs">
    <button onclick="setTab('passenger')">🚕 Passenger</button>
    <button onclick="setTab('parcel')">📦 Parcel</button>
    <button onclick="setTab('freight')">🚚 Freight (DAT)</button>
  </div>

  <!-- ROUTE INPUTS -->
  <input id="origin" placeholder="Origin"/>
  <input id="destination" placeholder="Destination"/>

  <div id="originList" class="suggestions"></div>
  <div id="destinationList" class="suggestions"></div>

  <button onclick="submitRide()">Submit</button>

  <!-- PASSENGER -->
  <div id="passenger" class="section active">
    <h3>Passenger Rides</h3>
    <div id="rides"></div>
  </div>

  <!-- PARCEL -->
  <div id="parcel" class="section">
    <h3>Parcel Jobs</h3>
    <div id="parcelList"></div>
  </div>

  <!-- FREIGHT -->
  <div id="freight" class="section">
    <h3>DAT Loadboard</h3>
    <div id="loadboard"></div>
  </div>

</div>

 
<div id="map"></div>
 <div style="margin-top:15px;padding:10px;background:#111;color:#0f0;font-size:12px;">
  <b>🔧 SYSTEM DEBUG</b>
  <div id="debugPanel">Loading...</div>
</div>

  
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="app.js"></script>

</body>
</html>
