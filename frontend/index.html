<!DOCTYPE html>
<html>
<head>
  <title>Uber Clone Clean</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .panel {
      width: 50%;
      padding: 15px;
      overflow-y: auto;
      position: relative;
    }

    .rider {
      background: #f4f8ff;
      border-right: 2px solid #ccc;
    }

    .driver {
      background: #fff4f4;
    }

    input {
      padding: 8px;
      width: 90%;
      margin-bottom: 5px;
    }

    button {
      padding: 6px 10px;
      margin: 5px 0;
      cursor: pointer;
    }

    .ride {
      border: 1px solid #ccc;
      padding: 10px;
      margin: 10px 0;
      background: white;
    }

    #map {
      height: 300px;
      margin-top: 10px;
      border: 1px solid #ccc;
    }

    .input-wrapper {
      position: relative;
      width: 90%;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- RIDER -->
  <div class="panel rider">
    <h2>🚗 Rider</h2>

    <div class="input-wrapper">
      <input id="pickup" placeholder="Pickup address">
    </div>

    <div class="input-wrapper">
      <input id="destination" placeholder="Destination address">
    </div>

    <button onclick="createRide()">Create Ride</button>

    <div id="riderRides"></div>

    <div id="map"></div>
  </div>

  <!-- DRIVER -->
  <div class="panel driver">
    <h2>🚕 Driver</h2>

    <div id="driverRides"></div>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
